apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: last-24-hours
spec:
  # Query events from the last 24 hours
  # Perfect for daily monitoring and alerts
  startTime: "now-24h"
  endTime: "now"

  # Example: Track failed operations
  filter: "responseStatus.code >= 400"

  limit: 1000
