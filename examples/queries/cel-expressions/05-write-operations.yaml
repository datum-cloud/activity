apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: write-operations
spec:
  # Query the last 7 days
  startTime: "now-7d"
  endTime: "now"
  # Find all write operations (create, update, patch, delete)
  filter: "verb in ['create', 'update', 'patch', 'delete']"
  limit: 100
