apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: specific-resource-history
spec:
  # Query the last 7 days
  startTime: "now-7d"
  endTime: "now"
  # Track history of a specific resource by name
  filter: |
    objectRef.namespace == 'production' &&
    objectRef.resource == 'deployments' &&
    objectRef.name == 'my-app'
  limit: 50
