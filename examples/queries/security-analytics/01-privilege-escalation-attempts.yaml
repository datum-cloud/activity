apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: rbac-modifications
spec:
  # Query the last 7 days
  startTime: "now-7d"
  endTime: "now"
  # Detect potential privilege escalation via RBAC changes
  filter: |
    objectRef.resource in ['roles', 'rolebindings', 'clusterroles', 'clusterrolebindings'] &&
    verb in ['create', 'update', 'patch']
  limit: 100
