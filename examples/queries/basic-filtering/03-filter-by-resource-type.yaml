apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: pod-operations
spec:
  # Query the last 7 days
  startTime: "now-7d"
  endTime: "now"

  # Filter all operations on pods
  filter: "objectRef.resource == 'pods'"

  # Limit results (always ordered by timestamp DESC)
  limit: 100
