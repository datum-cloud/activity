apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: admin-user-activity
spec:
  # Query the last 7 days
  startTime: "now-7d"
  endTime: "now"

  # Filter all operations performed by admin user
  filter: "user.username == 'system:admin'"

  # Limit results (always ordered by timestamp DESC)
  limit: 200
