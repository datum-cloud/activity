apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: all-delete-operations
spec:
  # Query the last 24 hours
  startTime: "now-24h"
  endTime: "now"

  # Filter all delete operations across all namespaces
  filter: "verb == 'delete'"

  # Limit results (always ordered by timestamp DESC)
  limit: 50
