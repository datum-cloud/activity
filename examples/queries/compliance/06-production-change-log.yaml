apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: production-changes
spec:
  # Query the last 7 days
  startTime: "now-7d"
  endTime: "now"
  # Track all changes to production namespace for change control
  filter: |
    objectRef.namespace == 'production' &&
    verb in ['create', 'update', 'patch', 'delete']
  limit: 200
