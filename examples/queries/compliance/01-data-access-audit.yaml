apiVersion: activity.miloapis.com/v1alpha1
kind: AuditLogQuery
metadata:
  name: sensitive-data-access
spec:
  # Query the last 7 days
  startTime: "now-7d"
  endTime: "now"
  # Audit access to secrets and configmaps for compliance
  filter: "objectRef.resource in ['secrets', 'configmaps']"
  limit: 200
