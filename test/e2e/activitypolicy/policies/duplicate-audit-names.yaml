apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: test-duplicate-audit-names
spec:
  resource:
    apiGroup: apps
    kind: Deployment
  auditRules:
    - name: same-name
      match: "audit.verb == 'create'"
      summary: "{{ actor }} created deployment"
    - name: same-name
      match: "audit.verb == 'delete'"
      summary: "{{ actor }} deleted deployment"
