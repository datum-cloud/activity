apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: test-duplicate-event-names
spec:
  resource:
    apiGroup: apps
    kind: Deployment
  eventRules:
    - name: same-name
      match: "event.reason == 'ScalingReplicaSet'"
      summary: "Deployment {{ event.involvedObject.name }} scaled"
    - name: same-name
      match: "event.reason == 'SuccessfulCreate'"
      summary: "Deployment {{ event.involvedObject.name }} created pod"
